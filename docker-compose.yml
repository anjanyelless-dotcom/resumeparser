version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: resume-parser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resume_parser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resume_parser_secure_password}
      POSTGRES_DB: resume_parser
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_parser -d resume_parser"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - resume-parser-network
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=2
      -c max_parallel_workers_per_gather=1
      -c max_parallel_workers=2

  # Backend Service
  backend:
    build:
      context: ./backend/src
      dockerfile: Dockerfile
    container_name: resume-parser-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://resume_parser:${DB_PASSWORD:-resume_parser_secure_password}@postgres:5432/resume_parser
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_this}
      AI_SERVICE_URL: http://ai-service:8000
      FILE_UPLOAD_PATH: ./uploads
      MAX_FILE_SIZE_MB: 10
      LLM_PROVIDER: gemini
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
      - model-cache:/app/models/cache
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - resume-parser-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: resume-parser-ai-service
    restart: unless-stopped
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      DEBUG: "false"
      LOG_LEVEL: INFO
      MODEL_NAME: dslim/bert-base-NER
      MODEL_CACHE_DIR: /app/models/cache
      MAX_RESUME_LENGTH: 5000
      CONFIDENCE_THRESHOLD: 0.80
      DEVICE: cpu
      BATCH_SIZE: 8
      MAX_SEQUENCE_LENGTH: 512
      DEBERTA_MODEL_PATH: /app/models/cache
      API_PREFIX: /api/v1
      DOCS_URL: /docs
      RELOAD: "false"
      WORKERS: 1
      TIMEOUT: 120
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: resume_parser
      DB_USER: resume_parser
      DB_PASSWORD: ${DB_PASSWORD:-resume_parser_secure_password}
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      TOKENIZERS_PARALLELISM: "false"
      TRANSFORMERS_CACHE: /app/models/cache
      HF_HOME: /app/models/cache
    volumes:
      - model-cache:/app/models/cache
      - ai-service-logs:/app/logs
      - ai-service-uploads:/app/uploads
      - ai-service-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resume-parser-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: resume-parser-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/digitalocean-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - backend
      - ai-service
    networks:
      - resume-parser-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

networks:
  resume-parser-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
    driver: local
  model-cache:
    driver: local
  backend-uploads:
    driver: local
  backend-logs:
    driver: local
  ai-service-logs:
    driver: local
  ai-service-uploads:
    driver: local
  ai-service-data:
    driver: local
  nginx-logs:
    driver: local